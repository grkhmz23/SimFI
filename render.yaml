# SimFi - Render Blueprint Configuration
# This file configures the SimFi deployment on Render

services:
  # Main Web Service - Full-stack application (includes Telegram bot via webhook)
  - type: web
    name: simfi-web
    runtime: node
    plan: standard
    region: oregon
    buildCommand: NODE_ENV=development npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: simfi-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: BOT_API_SECRET
        generateValue: true
      # Telegram Bot (optional — runs integrated inside the web service via webhook)
      # 1. Get a token from @BotFather and set TELEGRAM_BOT_TOKEN after deploy
      # 2. Set PUBLIC_URL to your Render domain, e.g. https://simfi-web.onrender.com
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET_PATH
        generateValue: true
      - key: TELEGRAM_WEBHOOK_SECRET_TOKEN
        generateValue: true
    autoDeploy: true

databases:
  - name: simfi-db
    plan: free
    region: oregon
    postgresMajorVersion: "15"
