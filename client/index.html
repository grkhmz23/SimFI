    <script>
      // Prevent Vite HMR WebSocket errors from crashing the app in production
      window.addEventListener('unhandledrejection', (event) => {
        if (event.reason?.message?.includes('WebSocket') || event.reason?.message?.includes('wss://localhost:undefined')) {
          event.preventDefault();
          console.warn('Suppressed WebSocket error:', event.reason);
